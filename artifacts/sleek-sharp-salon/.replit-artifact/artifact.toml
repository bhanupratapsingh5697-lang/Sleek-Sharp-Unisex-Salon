kind = "web"
previewPath = "/"
title = "Sleek & Sharp Unisex Salon"
version = "1.0.0"
id = "artifacts/sleek-sharp-salon"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24483

[services.development]
run = "pnpm --filter @workspace/sleek-sharp-salon run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sleek-sharp-salon", "run", "build" ]
publicDir = "artifacts/sleek-sharp-salon/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24483"
BASE_PATH = "/"
